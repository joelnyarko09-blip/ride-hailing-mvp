<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Map Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet"/>

<style>
body { margin:0; padding:0; }
#map { position:absolute; top:0; bottom:0; width:100%; }
</style>

</head>

<body>
<input 
id="search" 
placeholder="Search location" 
style="position:absolute; z-index:1; margin:20px; padding:10px;">
<div id="ride-info" 
style="
position:absolute;
bottom:20px;
left:20px;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
z-index:1;
font-family:sans-serif;">
Ride info will appear here
</div>
<div id="map"></div>

<script>
mapboxgl.accessToken = 'YOUR_MAPBOX_PUBLIC_TOKEN';

const map = new mapboxgl.Map({
container: 'map',
style: 'mapbox://styles/mapbox/streets-v12',
center: [-0.1870, 5.6037],
zoom: 12
});
map.on("load", ()=>{

const pickup = [-0.1870, 5.6037];
const dropoff = [-0.2000, 5.6200];
console.log("Map loaded. Pickup & dropoff ready.");

getRoute(pickup, dropoff);

});
// Add pickup marker (example: Accra)
new mapboxgl.Marker()
.setLngLat([-0.1870, 5.6037])
.addTo(map);
let pickupMarker = null;
let dropoffMarker = null;
let pickupCoords = null;
let dropoffCoords = null;

map.on('click', (e) => {

    const coords = [e.lngLat.lng, e.lngLat.lat];

    // FIRST CLICK = PICKUP
    if (!pickupCoords) {

        pickupCoords = coords;

        if (pickupMarker) pickupMarker.remove();

        pickupMarker = new mapboxgl.Marker({ color: "green" })
            .setLngLat(coords)
            .addTo(map);

        console.log("Pickup set:", pickupCoords);

    }

    // SECOND CLICK = DROPOFF
    else if (!dropoffCoords) {

        dropoffCoords = coords;

        if (dropoffMarker) dropoffMarker.remove();

        dropoffMarker = new mapboxgl.Marker({ color: "red" })
            .setLngLat(coords)
            .addTo(map);

        console.log("Dropoff set:", dropoffCoords);

        getRoute(pickupCoords, dropoffCoords);

    }

    // THIRD CLICK = RESET EVERYTHING
    else {

        pickupCoords = coords;
        dropoffCoords = null;

        if (pickupMarker) pickupMarker.remove();
        if (dropoffMarker) dropoffMarker.remove();

        if (map.getSource("route")) {
            map.removeLayer("route-line");
            map.removeSource("route");
        }

        pickupMarker = new mapboxgl.Marker({ color: "green" })
            .setLngLat(coords)
            .addTo(map);

        dropoffMarker = null;

        console.log("Reset. New pickup:", pickupCoords);
    }

});
document.getElementById("search").addEventListener("keypress", async (e) => {

if(e.key === "Enter"){
    const query = e.target.value;
    const response = await fetch(
        `https://api.mapbox.com/geocoding/v5/mapbox.places/${query}.json?access_token=${mapboxgl.accessToken}`
    );
    const data = await response.json();
    if (data.features && data.features.length > 0) {
        const coords = data.features[0].center;
        map.flyTo({
            center: coords,
            zoom: 14
        });
        new mapboxgl.Marker()
            .setLngLat(coords)
            .addTo(map);
    } else {
        alert('Location not found!');
    }
}

});

async function getRoute(start, end){

document.getElementById("ride-info").innerHTML = "Calculating route...";
const url =
    `https://api.mapbox.com/directions/v5/mapbox/driving/`
    + `${start[0]},${start[1]};${end[0]},${end[1]}`
    + `?geometries=geojson&access_token=${mapboxgl.accessToken}`;
    const response = await fetch(url);
    const data = await response.json();
    if (data.routes && data.routes.length > 0) {
        const route = data.routes[0].geometry;
        const distance = (data.routes[0].distance / 1000).toFixed(2);
        const duration = (data.routes[0].duration / 60).toFixed(1);
        document.getElementById("ride-info").innerHTML =
            `Distance: ${distance} km <br> Duration: ${duration} mins`;
        if(map.getSource("route")){
            map.removeLayer("route-line");
            map.removeSource("route");
        }
        map.addSource("route",{
            type:"geojson",
            data:{
                type:"Feature",
                geometry:route
            }
        });
        map.addLayer({
            id:"route-line",
            type:"line",
            source:"route",
            paint:{
                "line-color":"blue",
                "line-width":5
            }
        });
    } else {
        document.getElementById("ride-info").innerHTML = 'Route not found!';
    }
}

</script>

</body>
</html>
